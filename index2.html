<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
</head>
<body class="contacts">
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Main Page</a></li>
                <li><a href="index2.html">Contacts</a></li>
                <li><a href="index3.html">About Us</a></li>
                <li><a href="index4.html">Discord Server</a></li>
            </ul>
        </nav>
        <button class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>
    
    <div class="secondintro">
        <h1>
            So these are the contacts.<br>
            Use these for submitting ideas,<br>
            asking questions,<br>
            or just chatting with us!
        </h1>
        <p>
            Phone: +37254510119 <br>
            Discord: bxrtexplayz, display name: bxrtex <br>
            Discord server: coming soon!
        </p>
    </div>

    <a href="index.html">
        <button class="backbtn">Back to Home</button>
    </a>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const nav = document.querySelector('nav');
        
        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            nav.classList.toggle('active');
        });

        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', () => {
                menuToggle.classList.remove('active');
                nav.classList.remove('active');
            });
        });
    </script>
</body>
